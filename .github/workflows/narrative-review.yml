name: US Narrative Review

on:
  schedule:
    # 07:30 Asia/Seoul, Monday and Wednesday.
    # GitHub Actions schedules use UTC, so this runs 22:30 UTC Sunday and Tuesday.
    - cron: "30 22 * * 0,2"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: us-narrative-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Generate US narrative review
        run: npm.cmd run narrative-review:us

      - name: Apply US narrative review
        run: npm.cmd run apply-narrative-review:us

      - name: Commit and push narrative review
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/narrativeDefinitions.json reports/us/narrative-review.md reports/us/narrative-review.json
          git diff --cached --quiet; if ($LASTEXITCODE -eq 0) { "No narrative review changes to commit."; exit 0 }
          git commit -m "Update US narrative review"
          git push
