name: Mobile Daily Routine

on:
  schedule:
    # 08:00 Asia/Seoul, Monday-Friday.
    # GitHub Actions schedules use UTC, so this runs 23:00 UTC Sunday-Thursday.
    - cron: "0 23 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: mobile-daily-routine
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Generate REAL_TEST report
        run: npm.cmd run daily-publish:real-test

      - name: Commit and push report
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_data_real.json data/latest-report.json data/previous-report.json data/dailyReports reports docs
          $hasChanges = git diff --cached --quiet; if ($LASTEXITCODE -eq 0) { "No report changes to commit."; exit 0 }
          git commit -m "Update daily trading report"
          git push
