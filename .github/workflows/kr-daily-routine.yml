name: KR Daily Routine

on:
  schedule:
    # 08:10 Asia/Seoul, Monday-Friday.
    # GitHub Actions schedules use UTC, so this runs 23:10 UTC Sunday-Thursday.
    - cron: "10 23 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DART_API_KEY: ${{ secrets.DART_API_KEY }}
  OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}

concurrency:
  group: kr-daily-routine
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Check DART secret configuration
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DART_API_KEY) -and [string]::IsNullOrWhiteSpace($env:OPENDART_API_KEY)) {
            "### KR data reliability preflight" >> $env:GITHUB_STEP_SUMMARY
            "- DART_API_KEY / OPENDART_API_KEY is not configured. KR report will mark DART as DISABLED and news reliability as LOW." >> $env:GITHUB_STEP_SUMMARY
          } else {
            "### KR data reliability preflight" >> $env:GITHUB_STEP_SUMMARY
            "- DART secret is configured. KR report will attempt OpenDART disclosure collection." >> $env:GITHUB_STEP_SUMMARY
          }

      - name: Refresh KOSPI200 fallback universe
        shell: pwsh
        run: |
          python scripts/update_kospi200_fallback.py
          if ($LASTEXITCODE -ne 0) {
            "KOSPI200 fallback refresh failed; continuing with committed fallback universe."
            exit 0
          }

      - name: Generate KR REAL_TEST report
        run: npm.cmd run daily-publish:kr

      - name: Commit and push KR report
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/markets/kr/kospi200Fallback.json config/markets/kr/etfHoldingsFallback.json data/kr reports/kr docs/kr docs/index.html
          $hasChanges = git diff --cached --quiet; if ($LASTEXITCODE -eq 0) { "No KR report changes to commit."; exit 0 }
          git commit -m "Update KR daily trading report"
          git push
